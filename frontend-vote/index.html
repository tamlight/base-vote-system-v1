<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Vote - Decentralized Governance & Betting</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --indigo: #6366f1;
            --indigo-glow: rgba(99, 102, 241, 0.15);
            --bg: #030014;
            --card: rgba(10, 10, 31, 0.8);
            --border: rgba(99, 102, 241, 0.2);
            --text: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
        }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.75rem; font-weight: 900; letter-spacing: -0.05em; display: flex; align-items: center; gap: 0.5rem; color: #fff; }
        .logo span { color: var(--indigo); }

        .container { max-width: 1200px; margin: 3rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 350px; gap: 2rem; }

        .hero { grid-column: 1 / -1; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1)); border: 1px solid var(--border); padding: 3rem; border-radius: 32px; margin-bottom: 1rem; position: relative; overflow: hidden; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; color: #fff; margin-bottom: 1rem; }
        .hero p { font-size: 1.125rem; color: #94a3b8; max-width: 600px; }

        .poll-card { 
            background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; position: relative; transition: 0.3s; margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .poll-card:hover { transform: translateY(-4px); border-color: var(--indigo); }
        .poll-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .question { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 2rem; display: block; }

        .progress-container { margin-bottom: 1.5rem; }
        .progress-bar { height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; display: flex; margin-bottom: 0.5rem; }
        .progress-yes { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-no { height: 100%; background: linear-gradient(90deg, #ef4444, #f87171); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-labels { display: flex; justify-content: space-between; font-size: 0.875rem; color: #94a3b8; }

        .vote-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
        .btn-vote { 
            padding: 1rem; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.875rem; 
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-yes { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-yes:hover { background: #10b981; color: #fff; }
        .btn-no { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-no:hover { background: #ef4444; color: #fff; }

        .sidebar-section { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; margin-bottom: 2rem; }
        .sidebar-section h3 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 1.5rem; font-weight: 800; }

        .host-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 1rem; border-radius: 12px; color: #fff; margin-bottom: 1rem; outline: none; }
        .btn-primary { 
            width: 100%; background: var(--indigo); color: #fff; padding: 1rem; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; 
            box-shadow: 0 4px 14px var(--indigo-glow);
        }

        .wallet-btn { background: var(--indigo); color: #fff; padding: 0.6rem 1.25rem; border-radius: 99px; border: none; font-weight: 700; cursor: pointer; font-size: 0.875rem; }
        
        .badge { padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; background: rgba(255,255,255,0.05); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i data-lucide="vote"></i> BASE<span>VOTE</span>
        </div>
        <button id="connectBtn" class="wallet-btn" onclick="connectWallet()">Connect Wallet</button>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Predict. Vote. Win.</h1>
            <p>The only platform where <strong>Voter Power</strong> decides the winner. Most votes wins the entire pot, regardless of individual bet sizes.</p>
        </div>

        <section id="pollsContainer">
            <!-- Loading Polls... -->
        </section>

        <aside>
            <div class="sidebar-section">
                <h3>Launch a Poll</h3>
                <input type="text" id="pollQuestion" class="host-input" placeholder="What's the question?">
                <button class="btn-primary" onclick="createPoll()">Launch Poll</button>
            </div>

            <div class="sidebar-section">
                <h3>Voter Leaderboard</h3>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size:0.875rem;">0x82...1a2b</span>
                        <span class="badge" style="color:var(--indigo)">42 Wins</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size:0.875rem;">0x3c...d4e5</span>
                        <span class="badge" style="color:var(--indigo)">38 Wins</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section" style="background: linear-gradient(to bottom right, rgba(99, 102, 241, 0.1), transparent);">
                <h3>Real-Time Stats</h3>
                <p style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem;">Total Volume</p>
                <h4 style="font-size: 1.5rem; color: #fff;">4,132 ETH</h4>
            </div>
        </aside>
    </div>

    <script>
        lucide.createIcons();
        const CONTRACT_ADDRESS = "0xa82D6cF2C339105725B9466e2DCDc9FA7FEd2f8A";
        const ABI = [
            "function nextPollId() view returns (uint256)",
            "function getPollInfo(uint256 _id) view returns (string, uint256, uint256, uint256, uint256, bool, bool)",
            "function createPoll(string _q) external returns (uint256)",
            "function vote(uint256 _id, bool _side) external payable",
            "function resolve(uint256 _id) external",
            "function claim(uint256 _id) external"
        ];

        let provider, signer, contract;

        async function connectWallet() {
            if (window.ethereum) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const addr = await signer.getAddress();
                document.getElementById('connectBtn').innerText = addr.slice(0,6) + '...' + addr.slice(-4);
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                loadPolls();
            }
        }

        async function loadPolls() {
            const count = await contract.nextPollId();
            const container = document.getElementById('pollsContainer');
            container.innerHTML = "";
            
            for(let i = count - 1; i >= 0; i--) {
                const p = await contract.getPollInfo(i);
                const totalVoters = parseInt(p[1]) + parseInt(p[2]);
                const yesPercent = totalVoters > 0 ? (parseInt(p[1]) / totalVoters * 100) : 50;
                const noPercent = totalVoters > 0 ? (parseInt(p[2]) / totalVoters * 100) : 50;

                const div = document.createElement('div');
                div.className = "poll-card";
                div.innerHTML = `
                    <div class="poll-meta">
                        <span class="badge" style="color:var(--indigo)">POLL #${i}</span>
                        <span class="badge" style="background:${p[5] ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)'}; color:${p[5] ? '#ef4444' : '#10b981'}">
                            ${p[5] ? 'RESOLVED' : 'ACTIVE'}
                        </span>
                    </div>
                    <span class="question">${p[0]}</span>
                    
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-yes" style="width: ${yesPercent}%"></div>
                            <div class="progress-no" style="width: ${noPercent}%"></div>
                        </div>
                        <div class="progress-labels">
                            <span>YES: ${p[1]} Voters</span>
                            <span>NO: ${p[2]} Voters</span>
                        </div>
                    </div>

                    <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem; color:#94a3b8; font-size:0.875rem;">
                        <span>Pot: <b>${ethers.utils.formatEther(p[3].add(p[4]))} ETH</b></span>
                        <span>Winners: ${p[6] ? 'YES' : 'NO'}</span>
                    </div>

                    ${!p[5] ? `
                        <div style="background:rgba(255,255,255,0.03); padding:1.5rem; border-radius:16px;">
                            <p style="font-size:0.75rem; color:#94a3b8; margin-bottom:1rem;">PLACE YOUR BET</p>
                            <input type="number" id="bet-${i}" step="0.01" class="host-input" placeholder="Amount ETH">
                            <div class="vote-actions">
                                <button class="btn-vote btn-yes" onclick="vote(${i}, true)"><i data-lucide="thumbs-up"></i> YES</button>
                                <button class="btn-vote btn-no" onclick="vote(${i}, false)"><i data-lucide="thumbs-down"></i> NO</button>
                            </div>
                            <button class="btn-primary" style="margin-top:1rem; background:transparent; border:1px solid var(--border); box-shadow:none;" onclick="resolve(${i})">Resolve (Host Only)</button>
                        </div>
                    ` : `
                        <button class="btn-primary" onclick="claim(${i})">Claim Your Winnings</button>
                    `}
                `;
                container.appendChild(div);
                lucide.createIcons();
            }
        }

        async function createPoll() {
            const q = document.getElementById('pollQuestion').value;
            if(!q) return;
            const tx = await contract.createPoll(q);
            await tx.wait();
            loadPolls();
        }

        async function vote(id, side) {
            const amount = document.getElementById(`bet-${id}`).value;
            if(!amount) return;
            const tx = await contract.vote(id, side, { value: ethers.utils.parseEther(amount) });
            await tx.wait();
            loadPolls();
        }

        async function resolve(id) {
            const tx = await contract.resolve(id);
            await tx.wait();
            loadPolls();
        }

        async function claim(id) {
            const tx = await contract.claim(id);
            await tx.wait();
            alert("Funds claimed successfully!");
            loadPolls();
        }
    </script>
</body>
</html>
